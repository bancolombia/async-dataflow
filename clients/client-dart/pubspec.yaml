name: channel_sender_client
description: A Dart client for sending and receiving real-time events using WebSocket or SSE over Async DataFlow channels.
version: 3.2.1
homepage: https://github.com/bancolombia/async-dataflow
repository: https://github.com/bancolombia/async-dataflow.git

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.3
  logging: ^1.1.0
  logger: ^2.7.0
  validators: ^3.0.0
  http: ^1.1.0
  connectivity_plus: ^7.2.0
  rxdart: ^0.28.0

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  flutter_lints: ^6.0.0
  dart_code_linter: ^4.1.5
  build_runner: ^2.2.0
